<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>コピパレット｜顔文字・定型文・思考法をワンタップでコピー</title>
<meta name="description" content="顔文字・定型文・言語化・X装飾・思考法・アイデアをタップするだけでコピーできる無料ツール。SNS発信や日々のやりとりに。">
<meta name="theme-color" content="#0a0b0f">
<meta property="og:title" content="コピパレット">
<meta property="og:description" content="顔文字・定型文・X装飾をワンタップでコピー。SNS発信や日々のやりとりに使える無料ツール。">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<style>
  :root{--bg:#0a0b0f;--panel:#12141b;--line:#232838;--txt:#e9ecf5;--sub:#8b93a7;--accent:#ff5fa2;}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;}
  header{position:sticky;top:0;z-index:6;background:rgba(10,11,15,.9);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px 16px 8px;}
  .titlerow{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:18px;margin:0}h1 .dot{color:var(--accent)}
  .hint{font-size:12px;color:var(--sub)}
  .searchwrap{margin-top:9px;position:relative}
  #search{width:100%;padding:11px 38px 11px 14px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--txt);font-size:15px;outline:none}
  #search:focus{border-color:var(--accent)}
  .searchwrap .x{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--sub);cursor:pointer;font-size:18px;display:none}
  nav{display:flex;gap:8px;overflow-x:auto;padding:11px 16px 2px;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;padding:8px 14px;border-radius:999px;border:1px solid var(--line);
    background:var(--panel);color:var(--sub);font-size:14px;cursor:pointer;transition:.15s}
  .tab.active{color:#0a0b0f;background:var(--accent);border-color:var(--accent);font-weight:700}
  .controls{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;padding:8px 16px 2px;overflow-x:auto;scrollbar-width:none}
  .controls::-webkit-scrollbar{display:none}
  .gchips{display:flex;gap:6px;flex:1;overflow-x:auto;scrollbar-width:none}
  .gchips::-webkit-scrollbar{display:none}
  .gchip{white-space:nowrap;padding:5px 11px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel);color:var(--sub);font-size:12.5px;cursor:pointer}
  .gchip.active{color:var(--accent);border-color:var(--accent)}
  .toolbtns{display:flex;gap:4px;align-items:center;flex-shrink:0}
  .toolbtns .lab{font-size:11px;color:var(--sub)}
  .tbtn{padding:5px 9px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--sub);font-size:12px;cursor:pointer}
  .tbtn.active{color:#0a0b0f;background:var(--accent);border-color:var(--accent);font-weight:700}
  main{padding:12px 16px 90px}
  .count{font-size:12px;color:var(--sub);margin:2px 2px 12px}
  .groupttl{font-size:12px;color:var(--sub);font-weight:700;margin:18px 2px 8px;letter-spacing:.04em;border-left:3px solid var(--accent);padding-left:8px}
  .groupttl:first-of-type{margin-top:2px}
  .grid{display:grid;gap:10px}
  .grid.kao{grid-template-columns:repeat(auto-fill,minmax(108px,1fr))}
  .grid.kao.s{grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px}
  .grid.kao.l{grid-template-columns:repeat(auto-fill,minmax(172px,1fr))}
  .grid.text{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .grid.deco{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  .grid.list{grid-template-columns:1fr}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:15px 13px;cursor:pointer;transition:.12s;overflow:hidden}
  .card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .card:active{transform:scale(.98)}
  .card.copied{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset}
  .grid.kao .card{display:flex;align-items:center;justify-content:center;text-align:center;min-height:56px}
  .kao{font-size:18px;line-height:1.5;word-break:break-word}
  .grid.kao.s .kao{font-size:13px;line-height:1.35}.grid.kao.l .kao{font-size:24px}
  .grid.kao.s .card{min-height:48px;padding:8px 5px;border-radius:10px}
  .grid.kao.s .star{display:none}
  .grid.kao{gap:8px}
  .snip{font-size:14.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .lbl{font-size:11px;color:var(--sub);margin-top:6px}
  .deco-pre{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;line-height:1.5;white-space:pre;overflow-x:auto;color:#dfe4f2}
  .star{position:absolute;top:5px;right:7px;font-size:15px;color:#3a4056;padding:5px;line-height:1;z-index:2}
  .star.on{color:#ffd85f}
  .fill-card{cursor:default}.fill-card:hover{transform:none;border-color:var(--line)}
  .fill-lbl{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px}
  .fill-use{font-size:11px;color:var(--sub);margin-bottom:11px;line-height:1.5}
  .fill-body{font-size:14px;line-height:2.2;color:var(--txt)}
  .fill-body.mono{font-family:"SF Mono",Menlo,Consolas,monospace;white-space:pre;font-size:12.5px;line-height:1.7;overflow-x:auto}
  .fill-body input{background:#0c0e15;border:none;border-bottom:1.5px solid var(--accent);color:var(--txt);
    font-size:14px;font-family:inherit;padding:2px 7px;margin:0 3px;outline:none;border-radius:4px 4px 0 0;vertical-align:baseline}
  .fill-body.mono input{font-size:12.5px;padding:0 4px;margin:0 1px}
  .fill-body input::placeholder{color:#5a6376}
  .fill-btn{margin-top:12px;width:100%;padding:9px;border-radius:10px;border:1px solid var(--accent);
    background:transparent;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer}
  .fill-btn:active{background:var(--accent);color:#0a0b0f}
  .grid.fillgrid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
  .rowlist{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .row{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;border-bottom:1px solid var(--line);background:var(--panel);cursor:pointer;transition:.1s}
  .row:last-child{border-bottom:0}
  .row:hover{background:#161923}.row:active{background:#1b1f2b}
  .row.copied{box-shadow:0 0 0 2px var(--accent) inset}
  .row .txt{flex:1;min-width:0}
  .rsnip{font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .rsnip.mono{font-family:"SF Mono",Menlo,Consolas,monospace;white-space:pre;overflow-x:auto;font-size:13px}
  .rlbl{display:inline-block;font-size:10.5px;color:var(--accent);border:1px solid #2c3346;border-radius:6px;padding:1px 7px;margin-top:6px}
  .rstar{flex-shrink:0;font-size:17px;color:#3a4056;padding:2px 4px;line-height:1.2}
  .rstar.on{color:#ffd85f}
  .symgrid{gap:6px;grid-template-columns:repeat(auto-fill,minmax(56px,1fr))}
  .symgrid .card{min-height:50px;padding:6px;display:flex;align-items:center;justify-content:center}
  .symchar{font-size:21px;line-height:1;word-break:break-word}
  .symcard .star{display:none}
  .rowlist.compact .row{padding:8px 12px;align-items:center}
  .rowlist.compact .rsnip{font-size:13px}
  .acc{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;background:var(--panel)}
  .acchead{display:flex;align-items:center;gap:9px;padding:14px;cursor:pointer;user-select:none}
  .acchead:hover{background:#161923}
  .accname{flex:1;font-size:14px;font-weight:700}
  .acccount{font-size:12px;color:var(--sub)}
  .accarrow{color:var(--accent);font-size:12px;transition:transform .15s}
  .acc.open .accarrow{transform:rotate(90deg)}
  .accbody{display:none;padding:0 12px 12px}
  .acc.open .accbody{display:block}
  .favbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .favbtn{padding:8px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--accent);font-size:13px;font-weight:700;cursor:pointer}
  .favbtn:hover{border-color:var(--accent)}
  .morebtn{display:block;width:100%;margin:10px 0 4px;padding:10px;border-radius:10px;
    border:1px solid var(--line);background:var(--panel);color:var(--accent);font-size:13px;font-weight:700;cursor:pointer}
  .morebtn:hover{border-color:var(--accent)}
  footer{padding:22px 18px 40px;border-top:1px solid var(--line);margin-top:20px;color:var(--sub);font-size:11.5px;line-height:1.8}
  footer a{color:var(--accent)}
  .fnote{margin-bottom:8px}
  .empty{color:var(--sub);text-align:center;padding:44px 10px;font-size:14px;line-height:1.9}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--accent);
    color:#0a0b0f;font-weight:700;padding:11px 20px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;
    transition:.2s;z-index:20;box-shadow:0 8px 30px rgba(0,0,0,.5)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:520px){
    .row{padding:15px 14px}
    .rstar{font-size:20px;padding:4px 6px}
    .grid.kao .card{min-height:60px}
    .tab{padding:9px 14px}
    h1{font-size:17px}
    .hint{font-size:11px}
  }
</style>
</head>
<body>
<header>
  <div class="titlerow"><h1>コピ<span class="dot">パレット</span></h1><span class="hint">タップでコピー・☆でお気に入り</span></div>
  <div class="searchwrap"><input id="search" type="search" placeholder="🔍 検索（例: ありがとう・猫・矢印）" autocomplete="off"><span class="x" id="clearSearch">×</span></div>
</header>
<nav id="tabs"></nav>
<div class="controls">
  <div class="gchips" id="gchips"></div>
  <div class="toolbtns" id="sizebox" style="display:none"><span class="lab">大きさ</span>
    <button class="tbtn" data-s="s">小</button><button class="tbtn" data-s="m">中</button><button class="tbtn" data-s="l">大</button></div>
</div>
<main><div class="count" id="count"></div><div id="body"></div></main>
<footer>
  <div class="fnote">コピペして自由にお使いください。お気に入り（☆）はこの端末のブラウザに保存されます。</div>

</footer>
<div id="toast">コピーしました</div>

{ id:"shikou", label:"思考法", mode:"text", accent:"#9d7bff", groups:[{"name": "伝える・書く", "items": [{"label": "PREP法", "use": "結論から手短に説得力をもって伝えたいとき", "template": "結論：{結論}\n理由：{結論}なのは、{理由}だからです\n具体例：たとえば、{具体例}\n結論：だから、{結論}"}, {"label": "SDS法", "use": "要点をはさんで話を分かりやすくまとめたいとき", "template": "要点：これから{テーマ}についてお話しします\n詳細：具体的には、{詳細1}、そして{詳細2}です\n要点：つまり、{テーマ}は{まとめ}ということです"}, {"label": "起承転結", "use": "読み手を引き込むストーリー仕立てで書きたいとき", "template": "起：{導入の状況}\n承：{話の展開}\n転：{意外な展開・転換}\n結：{結末・結論}"}, {"label": "なぜなぜ分析", "use": "問題の根本原因まで掘り下げたいとき", "template": "問題：{問題}\nなぜ？→{原因1}\nなぜ？→{原因2}\nなぜ？→{原因3}\nなぜ？→{原因4}\nなぜ？→{根本原因}\n対策：{対策}"}, {"label": "三段論法", "use": "前提から論理的に結論を導きたいとき", "template": "大前提：{一般的に正しい事実}\n小前提：{個別の事実}\n結論：ゆえに、{結論}"}, {"label": "ホールパート法", "use": "全体像を示してから要素を整理して伝えたいとき", "template": "全体：{テーマ}のポイントは{数}つあります\n部分1：1つ目は{要素1}\n部分2：2つ目は{要素2}\n部分3：3つ目は{要素3}\n全体：以上の{数}つが{テーマ}のポイントです"}, {"label": "DESC法", "use": "角を立てずに要望や意見を主張したいとき", "template": "描写：{客観的な事実・状況}\n表現：それについて私は{自分の気持ち}と感じています\n提案：そこで、{具体的な提案}してはどうでしょうか\n結果：そうすれば、{期待される結果}になります"}, {"label": "FABE法", "use": "商品やサービスの価値を売り込みたいとき", "template": "特徴：{商品}の特徴は{特徴}です\n利点：この特徴により{利点}があります\n利益：あなたにとって{利益}というメリットがあります\n証拠：実際に、{証拠・実績}という事実があります"}, {"label": "AIDA法", "use": "広告やセールス文で行動まで導きたいとき", "template": "注意：{興味を引く一言}\n関心：{相手の悩みや欲求に触れる内容}\n欲求：{商品}があれば{理想の状態}が手に入ります\n行動：今すぐ{行動の呼びかけ}してください"}, {"label": "TAPS法", "use": "理想と現状のギャップから解決策を提案したいとき", "template": "理想：本来あるべき姿は{理想の状態}です\n現状：しかし今は{現状}になっています\n問題：このギャップの原因は{問題}です\n解決：そこで{解決策}を提案します"}, {"label": "5W1H", "use": "情報の抜け漏れなく事実を整理して伝えたいとき", "template": "いつ：{When}\nどこで：{Where}\n誰が：{Who}\n何を：{What}\nなぜ：{Why}\nどのように：{How}"}, {"label": "ピラミッドストラクチャー", "use": "主張を複数の根拠で構造的に支えたいとき", "template": "結論：{主張・結論}\n根拠1：{根拠1}（裏付け：{裏付け1}）\n根拠2：{根拠2}（裏付け：{裏付け2}）\n根拠3：{根拠3}（裏付け：{裏付け3}）"}, {"label": "空・雨・傘", "use": "事実から解釈と行動を筋道立てて示したいとき", "template": "空（事実）：{観察された事実}\n雨（解釈）：この事実から{解釈・意味}と考えられます\n傘（行動）：だから{とるべき行動}すべきです"}, {"label": "STAR法", "use": "自分の経験や実績を具体的にアピールしたいとき", "template": "状況：{当時の状況}\n課題：その中で{取り組むべき課題}がありました\n行動：私は{とった行動}をしました\n結果：その結果、{得られた成果}を達成しました"}, {"label": "序論・本論・結論", "use": "レポートや論説を型どおりに構成したいとき", "template": "序論：{テーマ}について、{問題提起}\n本論：その理由・根拠は{論拠}です\n結論：以上から、{結論}と言えます"}, {"label": "PASONA法", "use": "悩みに寄り添いながら購入や申込みへ導きたいとき", "template": "問題：{相手が抱える問題}で悩んでいませんか\n親近：私も同じ{悩み}を経験しました\n解決：その原因は{原因}で、{解決策}で解決できます\n提案：そこで{商品・提案}をご用意しました\n絞込：{限定条件}の方限定です\n行動：今すぐ{行動}してください"}]}, {"name": "深める・分析する", "items": [{"label": "なぜなぜ分析", "use": "問題の根本原因を掘り下げたいとき", "template": "問題: {問題}\nなぜ①: {なぜ1}\nなぜ②: {なぜ2}\nなぜ③: {なぜ3}\nなぜ④: {なぜ4}\nなぜ⑤: {なぜ5}\n根本原因: {根本原因}\n打つべき対策: {対策}"}, {"label": "ロジックツリー", "use": "課題を要素に分解して全体像を捉えたいとき", "template": "テーマ: {テーマ}\n├ 要素1: {要素1}\n│ ├ {詳細1a}\n│ └ {詳細1b}\n├ 要素2: {要素2}\n│ ├ {詳細2a}\n│ └ {詳細2b}\n└ 要素3: {要素3}\n  ├ {詳細3a}\n  └ {詳細3b}\n注力すべき枝: {注力ポイント}"}, {"label": "MECE", "use": "モレなくダブりなく分類したいとき", "template": "分類したいテーマ: {テーマ}\n分ける切り口: {切り口}\n・カテゴリA: {A}\n・カテゴリB: {B}\n・カテゴリC: {C}\n・その他: {その他}\nモレ・ダブりの確認: {確認結果}"}, {"label": "5W1H", "use": "物事を多角的に整理して抜けを防ぎたいとき", "template": "テーマ: {テーマ}\nWhen(いつ): {いつ}\nWhere(どこで): {どこで}\nWho(誰が): {誰が}\nWhat(何を): {何を}\nWhy(なぜ): {なぜ}\nHow(どうやって): {どうやって}"}, {"label": "SWOT分析", "use": "強み弱みと外部環境を整理して方針を立てたいとき", "template": "分析対象: {対象}\n強み(Strength): {強み}\n弱み(Weakness): {弱み}\n機会(Opportunity): {機会}\n脅威(Threat): {脅威}\nここから導く方針: {方針}"}, {"label": "特性要因図(フィッシュボーン)", "use": "ある結果に影響する要因を体系的に洗い出したいとき", "template": "特性(注目する結果): {結果}\n人(Man)の要因: {人の要因}\n方法(Method)の要因: {方法の要因}\n設備(Machine)の要因: {設備の要因}\n材料(Material)の要因: {材料の要因}\n最も影響が大きい要因: {主要因}"}, {"label": "3C分析", "use": "市場・競合・自社の関係から戦略を考えたいとき", "template": "テーマ: {テーマ}\n顧客(Customer): {顧客の状況}\n競合(Competitor): {競合の状況}\n自社(Company): {自社の状況}\n見えてきた勝ち筋: {戦略}"}, {"label": "So What? / Why So?", "use": "事実から示唆を引き出し、その論理を検証したいとき", "template": "事実・データ: {事実}\nSo What?(だから何が言える?): {示唆}\nWhy So?(なぜそう言える?): {根拠}\nたどり着く結論: {結論}"}, {"label": "帰納法", "use": "複数の事例から共通する法則を導きたいとき", "template": "事例1: {事例1}\n事例2: {事例2}\n事例3: {事例3}\n共通して言えること: {共通点}\n導かれる法則: {結論}"}, {"label": "演繹法", "use": "一般ルールを個別のケースに当てはめて結論を出したいとき", "template": "大前提(一般ルール): {大前提}\n小前提(目の前の事実): {小前提}\nよって導かれる結論: {結論}"}, {"label": "2軸マトリクス", "use": "2つの評価軸で対象を分類・整理したいとき", "template": "テーマ: {テーマ}\n縦軸: {縦軸}\n横軸: {横軸}\n右上(高×高): {右上}\n左上: {左上}\n右下: {右下}\n左下: {左下}\n最も注目すべき象限: {注目}"}, {"label": "因数分解", "use": "数値や成果を構成要素の掛け算に分けて考えたいとき", "template": "分解したい指標: {指標}\n= {要素1} × {要素2} × {要素3}\nボトルネックになっている要素: {ボトルネック}\n改善アクション: {アクション}"}, {"label": "アブダクション(仮説形成)", "use": "観察された事象から最も確からしい仮説を立てたいとき", "template": "観察された事象: {事象}\nもし{仮説}が正しいなら、この事象はうまく説明できる\n他に考えられる説明: {対抗仮説}\n最も確からしい仮説: {結論}\n検証する方法: {検証}"}, {"label": "ギャップ分析(As-Is / To-Be)", "use": "理想と現状の差を明らかにして課題を特定したいとき", "template": "テーマ: {テーマ}\nAs-Is(現状): {現状}\nTo-Be(あるべき姿): {理想}\nギャップ(埋めるべき差): {ギャップ}\nギャップを埋める課題: {課題}"}, {"label": "比較・対照", "use": "2つの対象を同じ観点で比べて違いを浮かび上がらせたいとき", "template": "比較する対象: {A} と {B}\n観点1「{観点1}」: {A}={A1} / {B}={B1}\n観点2「{観点2}」: {A}={A2} / {B}={B2}\n観点3「{観点3}」: {A}={A3} / {B}={B3}\nわかった本質的な違い: {結論}"}, {"label": "具体⇔抽象の往復", "use": "具体と抽象を行き来して物事の本質を捉えたいとき", "template": "目の前の具体的な事象: {具体}\n抽象化(要するに何?): {抽象}\n他の場面への展開: {別の具体例}\n引き出せる本質: {本質}"}]}, {"name": "届ける・動かす", "items": [{"label": "PREP法", "use": "結論を明確にして説得力のある説明をしたいとき", "template": "結論として、{主張}\n理由は、{理由}だからです\nたとえば、{具体例}\nですから、{主張の再確認}"}, {"label": "新PASONA法", "use": "商品やサービスを購入まで導きたいとき", "template": "{ターゲット}のあなた、{悩み}で困っていませんか\n実は私も{共感エピソード}\nそのお悩みは{解決策}で解決できます\n今なら{具体的な提案・特典}\nただし{限定条件}\nまずは{行動の呼びかけ}してみてください"}, {"label": "AIDMA", "use": "認知から購入までの心理段階に沿って訴求したいとき", "template": "【注目】{目を引くキャッチ}\n【興味】{相手が関心を持つ情報}\n【欲求】{手に入る理想の未来}\n【記憶】{覚えてもらう決め手・特徴}\n【行動】{今すぐできる次の一歩}"}, {"label": "QUEST法", "use": "見込み客を教育して購買へ導きたいとき", "template": "これは{対象者}のための話です\nあなたの{悩み・現状}、よく分かります\n実は{原因や本質の解説}なんです\nこのまま放置すると{リスク}、解決すれば{理想}\nだから今、{行動}しましょう"}, {"label": "FABE法", "use": "商品の魅力を根拠つきで説明したいとき", "template": "この{商品}の特徴は{特徴}です\nそのため{優位性・他との違い}という強みがあります\nあなたにとって{得られるメリット}になります\nその証拠に{データ・実績・事例}があります"}, {"label": "BAB法（ビフォー・アフター・ブリッジ）", "use": "変化の魅力で行動を促したいとき", "template": " { id:"idea", label:"アイデア", mode:"text", accent:"#ffd85f", groups:[{"name": "発想を広げる問い", "items": [{"label": "SCAMPER法", "use": "既存のものを7つの視点で変形して新案を出したいとき", "template": "「{対象}」を次の7視点で変えてみる\nS 代用: {何を別のもので代えられるか}\nC 結合: {何と組み合わせられるか}\nA 応用: {他の使い道はないか}\nM 変更: {大きさ・形・色をどう変えるか}\nP 転用: {別の分野で使えないか}\nE 削除: {何を省けるか}\nR 逆転: {順序や役割を逆にできないか}"}, {"label": "オズボーンのチェックリスト", "use": "9つの問いで既存アイデアを改良したいとき", "template": "「{アイデアの種}」について問う\n転用: {他に使い道は?}\n応用: {似たものはないか?}\n変更: {変えられる点は?}\n拡大: {大きく・多くできないか?}\n縮小: {小さく・減らせないか?}\n代用: {代わりになるものは?}\n置換: {入れ替えられるものは?}\n逆転: {逆にしたらどうなる?}\n結合: {組み合わせられるものは?}"}, {"label": "マンダラート", "use": "中心テーマから8方向へ連想を放射状に広げたいとき", "template": "中心テーマ「{テーマ}」を8方向へ広げる\n1 {関連ワード1}\n2 {関連ワード2}\n3 {関連ワード3}\n4 {関連ワード4}\n5 {関連ワード5}\n6 {関連ワード6}\n7 {関連ワード7}\n8 {関連ワード8}\nさらに気になった1つを新しい中心に置いて同じことを繰り返す"}, {"label": "アナロジー思考(類推)", "use": "別分野の解決策を借りて課題を解きたいとき", "template": "「{解決したい課題}」に似た構造を、まったく別の分野「{参照する分野}」から探す\nその分野では「{参照分野での解決策}」で解決している\nこれを自分の課題に置き換えると「{応用したアイデア}」になる"}, {"label": "リバースブレインストーミング", "use": "逆から考えて改善策を見つけたいとき", "template": "本来の目的「{達成したいこと}」をあえて逆にする\n「どうすれば{最悪の状態}になるか」を全部挙げる\n出た項目: {悪化させる要因}\nこれを裏返すと、改善策「{反転したアイデア}」が見える"}, {"label": "What if思考", "use": "大胆な仮定で発想を飛躍させたいとき", "template": "もし「{前提}」が「{ありえない仮定}」だったら?\nそのとき何が起きるか: {想像される変化}\nそこから現実に使えそうなヒント: {得られるアイデア}"}, {"label": "強制連想法", "use": "無関係な言葉を掛け合わせて意外な案を出したいとき", "template": "テーマ「{テーマ}」と、無関係に選んだ言葉「{ランダムな言葉}」を無理やり結びつける\n共通点や連想: {2つから浮かぶこと}\n生まれたアイデア: {掛け合わせたアイデア}"}, {"label": "制約発想法", "use": "あえて縛りを設けて工夫を引き出したいとき", "template": "「{対象}」にあえて厳しい制約「{課す制約}」を加える\nその制約の中で成立させるには?\n工夫: {制約下での解決策}"}, {"label": "極端化(スケール変換)", "use": "規模を極端に振って新しい姿を見たいとき", "template": "「{対象}」を極端にスケールさせて考える\nもし100倍になったら: {拡大した場合の姿}\nもし100分の1になったら: {縮小した場合の姿}\nそこから見えるアイデア: {得られた発想}"}, {"label": "視点変換法", "use": "他人の目で見て新しい着想を得たいとき", "template": "「{テーマ}」を、自分ではなく「{別の人物・立場}」の目で見る\nその人なら何を感じ、どうするか: {その視点での考え}\n自分に取り入れられる点: {得られたアイデア}"}, {"label": "はしご法(抽象化・具体化)", "use": "目的の階層を上下して別の手段を探したいとき", "template": "出発点「{具体的なモノ・コト}」\n上へ(抽象化)「これは結局何のため?」→ {上位の目的}\n下へ(具体化)「それを実現する別の手は?」→ {別の具体案}"}, {"label": "5W1Hで問い直す", "use": "6つの問いで対象を多面的にほぐしたいとき", "template": "「{テーマ}」を6つの問いでほぐす\nWhy なぜ{それをやるのか}\nWhat 何を{変えられるか}\nWho 誰の{ためか・誰とやるか}\nWhen いつ{やると良いか}\nWhere どこで{やるか}\nHow どうやって{実現するか}"}, {"label": "属性列挙法", "use": "対象を要素分解して各々を変えたいとき", "template": "「{対象}」を構成する属性に分解する\n属性1 {属性と現状}\n属性2 {属性と現状}\n属性3 {属性と現状}\nそれぞれを別のものに変えてみる → {変えた結果のアイデア}"}, {"label": "希望点列挙法", "use": "理想の状態から発想を膨らませたいとき", "template": "「{対象}」について「こうだったらいいのに」を制限なく挙げる\n希望1 {あったらいい状態}\n希望2 {あったらいい状態}\n希望3 {あったらいい状態}\n実現に一番近づけそうなもの: {形にするアイデア}"}, {"label": "欠点列挙法", "use": "不満点から改善アイデアを引き出したいとき", "template": "「{対象}」の不満・欠点を洗い出す\n欠点1 {不満な点}\n欠点2 {不満な点}\n欠点3 {不満な点}\nそれぞれを解消すると: {改善アイデア}"}, {"label": "なぜなぜ分析", "use": "なぜを繰り返して根本原因まで掘りたいとき", "template": "事象「{起きていること}」\nなぜ? → {理由1}\nなぜ? → {理由2}\nなぜ? → {理由3}\nなぜ? → {理由4}\nなぜ? → {根本原因}\nここから打ち手: {アイデア}"}, {"label": "二軸マトリクス発想", "use": "2軸で整理して空白地帯を狙いたいとき", "template": "テーマ「{テーマ}」を2つの軸で整理する\n横軸: {軸A}\n縦軸: {軸B}\n4象限のうち誰も手をつけていない空白: {空いている象限}\nそこを狙うアイデア: {新しい発想}"}, {"label": "形態分析法", "use": "要素の組み合わせを総当たりで試したいとき", "template": "「{対象}」を要素に分ける\n要素A の選択肢: {A1・A2・A3}\n要素B の選択肢: {B1・B2・B3}\n要素C の選択肢: {C1・C2・C3}\n各列から1つずつ選んで組み合わせる → {生まれた新案}"}, {"label": "時間軸シフト", "use": "時代をずらして新しい視点を得たいとき", "template": "「{テーマ}」を時代をずらして考える\n100年前ならどう扱われた?: {過去の視点}\n100年後ならどうなっている?: {未来の視点}\n今に活かせるヒント: {得られたアイデア}"}, {"label": "前提を疑う", "use": "常識を反転させて新しい打ち手を探したいとき", "template": "「{テーマ}」で当たり前とされている前提を書き出す\n常識: {みんなが信じている前提}\nもしこれが逆だったら?: {前提を反転した世界}\nそこから生まれる新しい打ち手: {アイデア}"}]}, {"name": "発信ネタを見つける問い", "items": [{"label": "5W1H展開法", "use": "1つのテーマからネタを多角的に洗い出したいとき", "template": "テーマ「{テーマ}」について問いを立てる\nWho（誰が）: {誰が関係するか}\nWhat（何を）: {何をするのか}\nWhen（いつ）: {どんなタイミングか}\nWhere（どこで）: {どんな場面か}\nWhy（なぜ）: {なぜ必要か}\nHow（どうやって）: {どうやるのか}\n→ 一番語れそうなのは「{選んだ切り口}」"}, {"label": "よくある質問(FAQ)発掘", "use": "読者が実際に困っていることをネタにしたいとき", "template": "{ターゲット}から一番よく聞かれる質問は「{質問}」\nこの質問の裏にある本当の悩みは「{本当の悩み}」\nだから「{回答・解決策}」を伝える"}, {"label": "過去の自分への手紙", "use": "初心者向けの学びネタを掘り出し const FAV_KEY="copyPalette.favs.v1",SIZE_KEY="copyPalette.kaoSize.v1",REC_KEY="copyPalette.recent.v1",SEEN_KEY="copyPalette.seen.v1";
let favs=new Set(JSON.parse(localStorage.getItem(FAV_KEY)||"[]"));
const saveFavs=()=>localStorage.setItem(FAV_KEY,JSON.stringify([...favs]));
let kaoSize=localStorage.getItem(SIZE_KEY)||"m";
let recent=JSON.parse(localStorage.getItem(REC_KEY)||"[]");
function pushRecent(t){recent=recent.filter(x=>x!==t);recent.unshift(t);recent=recent.slice(0,30);localStorage.setItem(REC_KEY,JSON.stringify(recent));}

const norm=it=>typeof it==="string"?{text:it}:it;
const isFill=o=>typeof o.template==="string";
const byId=id=>DATA.find(c=>c.id===id);
const vw=s=>[...s].reduce((a,c)=>a+(c.charCodeAt(0)>0x2500?2:1),0); // 全角=2の視覚幅
const favIndex={};
DATA.forEach(c=>c.groups.forEach(g=>g.items.forEach(it=>{const o=norm(it);
  if(!isFill(o))favIndex[o.text]={...o,mode:c.mode,accent:c.accent};})));

let active="kaomoji",group="all",query="";
const $=id=>document.getElementById(id);
const tabsEl=$("tabs"),gchipsEl=$("gchips"),sizeboxEl=$("sizebox"),
  bodyEl=$("body"),countEl=$("count"),searchEl=$("search"),clearBtn=$("clearSearch"),toastEl=$("toast");

const tabDefs=[{id:"recent",label:"🕘 最近",accent:"#9db2ff"},{id:"fav",label:"☆ お気に入り",accent:"#ffd85f"},...DATA.map(c=>({id:c.id,label:c.label+"("+c.groups.reduce((a,g)=>a+g.items.length,0)+")",accent:c.accent,cid:c.id}))];
tabDefs.forEach(t=>{const b=document.createElement("button");b.className="tab";b.textContent=t.label;
  b.dataset.id=t.cid||t.id;b.dataset.accent=t.accent;
  b.onclick=()=>{active=b.dataset.id;group="all";query="";searchEl.value="";clearBtn.style.display="none";renderAll();};
  tabsEl.appendChild(b);});
sizeboxEl.querySelectorAll(".tbtn").forEach(b=>b.onclick=()=>{kaoSize=b.dataset.s;localStorage.setItem(SIZE_KEY,kaoSize);renderAll();});

function renderAll(){updateTabs();renderChips();render();}
function updateTabs(){[...tabsEl.children].forEach(b=>{const on=b.dataset.id===active;
  b.classList.toggle("active",on);if(on)document.documentElement.style.setProperty("--accent",b.dataset.accent);});}
function renderChips(){
  const cat=byId(active);
  sizeboxEl.style.display=(cat&&cat.mode==="kao")?"flex":"none";
  sizeboxEl.querySelectorAll(".tbtn").forEach(b=>b.classList.toggle("active",b.dataset.s===kaoSize));
  gchipsEl.innerHTML="";
  if(!cat||cat.groups.length<=1)return;
  [{name:"すべて",key:"all"},...cat.groups.map(g=>({name:g.name,key:g.name}))].forEach(g=>{
    const c=document.createElement("button");c.className="gchip"+((group===g.key)?" active":"");
    c.textContent=g.name;c.onclick=()=>{group=g.key;render();updateChipsActive();};gchipsEl.appendChild(c);});
}
function updateChipsActive(){const cat=byId(active);
  [...gchipsEl.children].forEach((c,i)=>c.classList.toggle("active",group===(i===0?"all":cat.groups[i-1].name)));}
function matches(o){if(!query)return true;const q=query.toLowerCase();
  return((o.text||o.template||"")+" "+(o.label||"")+" "+(o.use||"")).toLowerCase().includes(q);}

function render(){
  bodyEl.innerHTML="";const cat=byId(active);
  if(active==="recent"){
    const bar=document.createElement("div");bar.className="favbar";
    bar.appendChild(fbtn("🗑 履歴をクリア",()=>{recent=[];localStorage.setItem(REC_KEY,"[]");render();}));
    bodyEl.appendChild(bar);
    const list=recent.map(t=>favIndex[t]||{text:t}).filter(matches);
    countEl.textContent=list.length+"件";
    if(!list.length){bodyEl.appendChild(emptyMsg("コピーした項目が\n新しい順でここに並びます"));return;}
    bodyEl.appendChild(makeGroupBox("text",list));return;}
  if(active==="fav"){
    bodyEl.appendChild(favToolbar());
    const list=[...favs].map(t=>favIndex[t]).filter(Boolean).filter(matches);
    countEl.textContent=list.length+"件";
    if(!list.length){bodyEl.appendChild(emptyMsg("☆でお気に入り登録すると\nここに集まります"));return;}
    bodyEl.appendChild(makeGroupBox("text",list));return;}
  let total=0;const allView=group==="all";const showTitles=cat.groups.length>1;
  const useAcc=allView&&!query&&cat.groups.length>1;let firstOpen=true;
  cat.groups.forEach(g=>{
    if(!allView&&group!==g.name)return;
    const items=g.items.map(norm).filter(matches).map(it=>({...it,mode:it.mode||cat.mode,accent:cat.accent}));
    if(!items.length)return;
    total+=items.length;
    if(useAcc){ bodyEl.appendChild(accordion(cat.mode,g.name,items,firstOpen)); firstOpen=false; }
    else {
      if(showTitles){const h=document.createElement("div");h.className="groupttl";h.textContent=g.name+"（"+items.length+"）";bodyEl.appendChild(h);}
      bodyEl.appendChild(makeGroupBox(cat.mode,items));
    }
  });
  countEl.textContent=total+"件";
  if(!total)bodyEl.appendChild(emptyMsg(query?"見つかりませんでした":"まだありません"));
}
function div(c){const d=document.createElement("div");d.className=c;return d;}
function makeNode(it,mode){ if(mode==="kao")return kaoCard(it); if(isFill(it))return fillCard(it); return rowItem(it,mode); }
function containerFor(mode,items){
  if(mode==="kao")return div("grid kao "+kaoSize);
  if(items.some(isFill))return div("grid fillgrid");
  return div("rowlist"); }
function symCard(it){const c=div("card symcard");const s=div("symchar");s.textContent=it.text;c.appendChild(s);
  c.appendChild(mkStar(it.text));c.onclick=()=>copy(it.text,c);return c;}
// 単一グループ/検索結果: 200件ずつ遅延描画。装飾は「単体記号=グリッド／区切り線=詰めた行」に出し分け
function makeGroupBox(mode,items){
  const wrap=div("");let cont,nodeFn;
  if(mode==="kao"){cont=div("grid kao "+kaoSize);nodeFn=kaoCard;}
  else if(items.some(isFill)){cont=div("grid fillgrid");nodeFn=fillCard;}
  else if(mode==="deco"){
    const maxLen=items.reduce((m,it)=>Math.max(m,(it.text||"").length),0);
    if(maxLen<=4){cont=div("grid symgrid");nodeFn=symCard;}
    else{cont=div("rowlist compact");nodeFn=it=>rowItem(it,"deco");}
  } else {cont=div("rowlist");nodeFn=it=>rowItem(it,mode);}
  wrap.appendChild(cont);
  const PAGE=200;let i=0;
  const btn=document.createElement("button");btn.className="morebtn";
  function more(){const end=Math.min(i+PAGE,items.length);for(;i<end;i++)cont.appendChild(nodeFn(items[i]));
    if(i>=items.length)btn.style.display="none";else btn.textContent="もっと見る（残り"+(items.length-i)+"件）";}
  btn.onclick=more;wrap.appendChild(btn);more();return wrap;}
// 折りたたみグループ（スマホで一覧から選べる／開いた時だけ描画で軽い）
function accordion(mode,name,items,open){
  const acc=div("acc"+(open?" open":""));
  const head=div("acchead");
  const arrow=document.createElement("span");arrow.className="accarrow";arrow.textContent="▸";
  const nm=document.createElement("span");nm.className="accname";nm.textContent=name;
  const ct=document.createElement("span");ct.className="acccount";ct.textContent=items.length+"件";
  head.appendChild(arrow);head.appendChild(nm);head.appendChild(ct);
  const body=div("accbody");let built=false;
  function build(){if(!built){built=true;body.appendChild(makeGroupBox(mode,items));}}
  head.onclick=()=>{acc.classList.toggle("open");if(acc.classList.contains("open"))build();};
  if(open)build();
  acc.appendChild(head);acc.appendChild(body);return acc;
}
// 「すべて」表示: 各グループ先頭48件だけプレビュー＋全部見るボタン（重さ対策）
function makePreview(mode,items,groupName){
  const wrap=div(""),N=48,slice=items.slice(0,N),cont=containerFor(mode,slice);
  slice.forEach(it=>cont.appendChild(makeNode(it,mode)));wrap.appendChild(cont);
  if(items.length>N){const btn=document.createElement("button");btn.className="morebtn";
    btn.textContent="「"+groupName+"」を全部見る（"+items.length+"件）";
    btn.onclick=()=>{group=groupName;render();updateChipsActive();window.scrollTo(0,0);};
    wrap.appendChild(btn);}
  return wrap;}
function kaoCard(it){const c=document.createElement("div");c.className="card";
  const s=document.createElement("div");s.className="kao";s.textContent=it.text;c.appendChild(s);
  c.appendChild(mkStar(it.text));c.onclick=()=>copy(it.text,c);return c;}
function rowItem(it,mode){
  const r=document.createElement("div");r.className="row";
  const t=document.createElement("div");t.className="txt";
  const s=document.createElement("div");s.className="rsnip"+(mode==="deco"?" mono":"");s.textContent=it.text;t.appendChild(s);
  if(it.label){const l=document.createElement("span");l.className="rlbl";l.textContent=it.label;t.appendChild(l);}
  r.appendChild(t);
  const star=document.createElement("span");star.className="rstar"+(favs.has(it.text)?" on":"");star.textContent=favs.has(it.text)?"★":"☆";
  star.onclick=e=>{e.stopPropagation();if(favs.has(it.text))favs.delete(it.text);else favs.add(it.text);
    saveFavs();star.classList.toggle("on");star.textContent=favs.has(it.text)?"★":"☆";if(active==="fav")render();};
  r.appendChild(star);r.onclick=()=>copy(it.text,r);return r;}
function fillCard(item){
  const card=document.createElement("div");card.className="card fill-card";
  if(item.label){const l=document.createElement("div");l.className="fill-lbl";l.textContent=item.label;card.appendChild(l);}
  if(item.use){const u=document.createElement("div");u.className="fill-use";u.textContent="こんなときに → "+item.use;card.appendChild(u);}
  const body=document.createElement("div");body.className="fill-body"+(item.mono?" mono":"");
  const parts=item.template.split(/(\{[^}]+\})/),inputs=[];
  parts.forEach(p=>{const mt=p.match(/^\{([^}]+)\}$/);
    if(mt){const inp=document.createElement("input");inp.placeholder=mt[1];
      inp.style.width=(vw(mt[1])*0.62+2.2)+"em";
      inp.oninput=()=>{inp.style.width=(Math.max(vw(inp.value),vw(mt[1]))*0.62+2.2)+"em";};
      inputs.push({inp,ph:mt[1]});body.appendChild(inp);}
    else{p.split("\n").forEach((seg,i)=>{if(i>0)body.appendChild(document.createElement("br"));
      body.appendChild(document.createTextNode(seg));});}});
  card.appendChild(body);
  const btn=document.createElement("button");btn.className="fill-btn";btn.textContent="この形でコピー";
  btn.onclick=()=>{let out=item.template;inputs.forEach(({inp,ph})=>out=out.replace("{"+ph+"}",inp.value.trim()||"◯◯"));copy(out,card);};
  card.appendChild(btn);return card;}
function mkStar(text){const star=document.createElement("span");
  star.className="star"+(favs.has(text)?" on":"");star.textContent=favs.has(text)?"★":"☆";
  star.onclick=e=>{e.stopPropagation();if(favs.has(text))favs.delete(text);else favs.add(text);
    saveFavs();star.classList.toggle("on");star.textContent=favs.has(text)?"★":"☆";if(active==="fav")render();};
  return star;}
function emptyMsg(t){const d=document.createElement("div");d.className="empty";d.textContent=t;return d;}
function fbtn(label,fn){const b=document.createElement("button");b.className="favbtn";b.textContent=label;b.onclick=fn;return b;}
function favToolbar(){
  const bar=document.createElement("div");bar.className="favbar";
  bar.appendChild(fbtn("⬆ エクスポート",()=>{
    if(!favs.size){toast("お気に入りがまだありません");return;}
    const code=btoa(unescape(encodeURIComponent(JSON.stringify([...favs]))));
    copy(code,null);toast("お気に入りコードをコピー！別の端末で「インポート」に貼り付け");
  }));
  bar.appendChild(fbtn("⬇ インポート",()=>{
    const code=prompt("エクスポートしたコードを貼り付けてください");
    if(!code)return;
    try{const arr=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
      let add=0;arr.forEach(t=>{if(!favs.has(t)){favs.add(t);add++;}});saveFavs();renderAll();
      toast("インポート完了（"+add+"件追加）");
    }catch(e){toast("コードが読み取れませんでした");}
  }));
  return bar;
}
async function copy(text,card){let ok=false;
  try{await navigator.clipboard.writeText(text);ok=true;}
  catch(e){try{const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.select();ok=document.execCommand("copy");document.body.removeChild(ta);}catch(_){}}
  if(card){card.classList.add("copied");setTimeout(()=>card.classList.remove("copied"),450);}
  if(ok)pushRecent(text);
  toast(ok?"コピーしました":"コピー失敗（手動で選択してください）");}
let toastTimer;function toast(m){toastEl.textContent=m;toastEl.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1300);}
searchEl.oninput=()=>{query=searchEl.value.trim();clearBtn.style.display=query?"block":"none";group="all";renderChips();render();};
clearBtn.onclick=()=>{searchEl.value="";query="";clearBtn.style.display="none";render();searchEl.focus();};
renderAll();
if(!localStorage.getItem(SEEN_KEY)){localStorage.setItem(SEEN_KEY,"1");setTimeout(()=>toast("タップでコピーできます！"),700);}
</script>
